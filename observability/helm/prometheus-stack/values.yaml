grafana:

  enabled: true

  adminPassword: admin123

  defaultDashboardsEnabled: true

  persistence:
    enabled: true
    size: 5Gi

  sidecar:
    dashboards:
      enabled: true

    datasources:
      enabled: true

alertmanager:

  enabled: true

prometheus:

  prometheusSpec:

    retention: 7d

    storageSpec:

      volumeClaimTemplate:

        spec:

          accessModes:
            - ReadWriteOnce

          resources:

            requests:
              storage: 10Gi

kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true
