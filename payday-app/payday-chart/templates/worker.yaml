apiVersion: apps/v1
kind: Deployment
metadata:
  name: payday-worker
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.worker.replicaCount | default 3 }}
  selector:
    matchLabels:
      app: payday-worker
  template:
    metadata:
      labels:
        app: payday-worker
    spec:
      containers:
        - name: worker
          image: '{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag | default "latest" }}'
          imagePullPolicy: Always
          env:
            - name: DB_HOST
              value: "payday-postgres-service"
            - name: DB_PASSWORD
              value: "vault_secret_pass"
            - name: REDIS_HOST
              value: "redis-service"
