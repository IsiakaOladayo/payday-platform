apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector: { matchLabels: { app: api } }
  template:
    metadata: { labels: { app: api } }
    spec:
      containers:
        - name: api
          image: {{ .Values.image.registry }}/payday/api:{{ .Values.image.tag }}
          ports: [{ containerPort: 5000 }]
          env:
            - { name: DB_HOST, value: "postgres" }
            - { name: DB_NAME, value: "{{ .Values.postgres.database }}" }
            - { name: DB_USER, value: "{{ .Values.postgres.user }}"     }
            - name: DB_PASS
              valueFrom: { secretKeyRef: { name: payday-db-secret, key: password } }
            - { name: APP_VERSION, value: "{{ .Values.image.tag }}" }
          readinessProbe: { httpGet: { path: /health, port: 5000 }, initialDelaySeconds: 10 }
          livenessProbe:  { httpGet: { path: /health, port: 5000 }, initialDelaySeconds: 30 }
---
apiVersion: v1
kind: Service
metadata: { name: api-service, namespace: "{{ .Release.Namespace }}" }
spec:
  selector: { app: api }
  ports: [{ port: 5000, targetPort: 5000 }]
