apiVersion: apps/v1
kind: Deployment
metadata:
  name: payday-frontend
  namespace: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payday-frontend
  template:
    metadata:
      labels:
        app: payday-frontend
    spec:
      containers:
      - name: frontend
        image: 618015514540.dkr.ecr.us-east-1.amazonaws.com/payday/frontend:v2
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
